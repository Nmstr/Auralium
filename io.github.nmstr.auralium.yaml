app-id: io.github.nmstr.auralium
runtime: org.kde.Platform
runtime-version: 6.7
sdk: org.kde.Sdk
command: run.sh

build-options:
  build-args:
    - --share=network

modules:
  - name: auralium
    buildsystem: simple
    sources:
      - type: dir
        path: /mnt/nvme/projects/musicPlayer/client/src
    build-commands:
      - pip3 install -r requirements.txt --prefix=/app
      - find ./ -type f -exec install -D "{}" "/app/bin/{}" \;

  - name: desktop
    buildsystem: simple
    sources:
      - type: dir
        path: /mnt/nvme/projects/musicPlayer/client/src/assets
    build-commands:
      - desktop-file-install --dir=/app/share/applications/ io.github.nmstr.auralium.desktop

finish-args:
  - --share=network
  - --socket=wayland
  - --socket=x11
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=xdg-music