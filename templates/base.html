<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KyZXEAg3QhqLMpG8r+8fhAXLRk2vvoC2f3B09zVXn8CA5QIVfZOJ3BCsw2P0p/We" crossorigin="anonymous">

    <style>
        body {
            background-color: #0d1117;
            color: #fff;
        }

        .bg-dark {
            background-color: #010409 !important;
        }

        #app-container {
            display: flex;
            min-height: 100vh;
        }

        #sidebar {
            width: 400px;
            background-color: #f1f1f1;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        #content {
            flex: 1;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        .no-bullets {
            list-style-type: none;
        }

        .sidebar-link {
            color: white;
            text-decoration: none;
          }
    </style>

    <title>{% block title %} {% endblock %} - Music Player</title>
</head>
<body>
<!-- navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('index') }}">Home</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="#">Number of Lines Over Time</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Number of Files Over Time</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">File Analysis</a>
                </li>
            </ul>
        </div>
        <!-- Move the profile picture to the right -->
        <div class="navbar-nav ms-auto">
            <li class="nav-item">
                <a class="nav-link" href="http://192.168.188.133:3000">Back to Gitea</a>
            </li>
        </div>
    </div>
</nav>

<div id="app-container">
    <div id="sidebar" class="bg-dark">
        <!-- Your sidebar content goes here -->
        <ul class="no-bullets">
            <!-- Applications -->
            <div class="container">
                {% for app in apps %}
                <li>
                    <a href="/applications/{{ app['application'] }}/{{ app['defaultRoute'] }}" class="sidebar-link">{{ app['name'] }}</a>
                </li>
                {% endfor %}
            </div>
            <!-- Playlist -->
            <div class="container">
                <li>Default Playlist 1</li>
                <li>Default Playlist 2</li>
                <li>Default Playlist 3</li>
            </div>
        </ul>
    </div>
    <div id="content">
        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-U1DAWAznBHeqEIlVSCgzq+c9gqGAJn5c/t99JyeKa9xxaYpSvHU5awsuZVVFIhvj" crossorigin="anonymous"></script>
</body>
</html>
